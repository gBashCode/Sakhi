version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: sakhi
      POSTGRES_PASSWORD: sakhi
      POSTGRES_DB: sakhi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  pgdata:
